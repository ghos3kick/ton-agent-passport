# Agent Passport — nginx configuration template
# Replace <DOMAIN>, <PROJECT_USER> with actual values before use.

# Security: hide nginx version
server_tokens off;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

# === Cloudflare real IP ===
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

server {
    server_name <DOMAIN>;

    # === Security Headers ===
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://t.me https://*.telegram.org;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # === General rate limit ===
    limit_req zone=general burst=40 nodelay;

    # === Block dotfiles ===
    location ~ /\. {
        deny all;
        return 404;
    }

    # === Block sensitive paths ===
    location /node_modules {
        return 404;
    }

    # === Bot API ===
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        client_max_body_size 100k;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Type $http_content_type;
    }

    # === TONAPI Proxy ===
    location /tonapi/ {
        limit_req zone=api burst=10 nodelay;

        set $cors_origin "";
        if ($http_origin ~* "^https?://<DOMAIN>$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^https://web\.telegram\.org$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass https://testnet.tonapi.io/;
        include /etc/nginx/snippets/tonapi-auth.conf;
        proxy_set_header Host testnet.tonapi.io;
        proxy_ssl_server_name on;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
    }

    # === Static: manifests ===
    location = /tonconnect-manifest.json {
        alias /home/<PROJECT_USER>/agent-passport/docs/tonconnect-manifest.json;
        add_header Access-Control-Allow-Origin * always;
        add_header Content-Type application/json always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location = /collection.json {
        alias /home/<PROJECT_USER>/agent-passport/docs/collection.json;
        add_header Access-Control-Allow-Origin * always;
        add_header Content-Type application/json always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # === Mini App ===
    location /mini-app/ {
        alias /home/<PROJECT_USER>/agent-passport/packages/mini-app/dist/;
        try_files $uri $uri/ /mini-app/index.html;

        # Override CSP for Mini App (synced with live config)
        add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https: wss:; img-src 'self' https: data:; frame-ancestors 'self' https://web.telegram.org https://t.me https://*.telegram.org;" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # === Landing page ===
    location = / {
        root /home/<PROJECT_USER>/agent-passport/landing;
        try_files /index.html =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # === Next.js Explorer ===
    location /explore {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # === Next.js passport detail pages ===
    location /passport/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # === Next.js static assets ===
    location /_next/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
}

server {
    listen 80;
    server_name <DOMAIN>;
    return 301 https://$host$request_uri;
}
